name: Build Windows

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DMACCY_BUILD_TESTS=ON

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install package layout
        run: cmake --install build --config Release --prefix package

      - name: Archive package
        shell: pwsh
        run: Compress-Archive -Path package\* -DestinationPath cliploom.zip

      - name: Upload executable package
        uses: actions/upload-artifact@v6
        with:
          name: cliploom
          path: cliploom.zip
          if-no-files-found: error
