name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DMACCY_BUILD_TESTS=ON

      - name: Build Release
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Install package layout
        run: cmake --install build --config Release --prefix package

      - name: Archive package
        shell: pwsh
        run: Compress-Archive -Path package\* -DestinationPath cliploom.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: cliploom
          path: cliploom.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $tag = $env:RELEASE_TAG
          $asset = "cliploom.zip"
          $notes = "Automated Windows build for $tag."

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber
          } else {
            gh release create $tag $asset --title $tag --notes $notes
          }
